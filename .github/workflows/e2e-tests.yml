name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  e2e-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm test
        env:
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let status = 'passed ✅';
            let statusCode = 0;
            
            if (context.payload.pull_request) {
              // Check if test run failed
              if ('${{ job.status }}' === 'failure') {
                status = 'failed ❌';
                statusCode = 1;
              } else {
                status = 'passed ✅';
                statusCode = 0;
              }
            }
            
            const comment = `
## 🤖 E2E Test Results

Tests: **${status}**

### Details
- **Branch:** \`${{ github.head_ref }}\`
- **Run:** [View in Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
- **Report:** Download artifact "playwright-report"

${statusCode === 1 ? '**Please check the test report for details.**' : 'All checks passed! Ready to merge.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });


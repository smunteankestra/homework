name: E2E Tests (Manual)

on:
  workflow_dispatch:
    inputs:
      headless:
        description: 'Run in headless mode (true/false)'
        required: true
        default: 'false'

jobs:
  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: https://studio.autonomyai.io
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: ${{ inputs.headless }}
          DEBUG: 'true'

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test videos on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: test-results/
          retention-days: 7

      - name: Comment on workflow run
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let status = '✅ Passed';
            if ('${{ job.status }}' === 'failure') {
              status = '❌ Failed';
            }
            
            const comment = `
            ## 🤖 E2E Test Run Complete
            
            **Status:** ${status}
            
            ### Details
            - **Run ID:** ${{ github.run_id }}
            - **Trigger:** Manual Workflow Dispatch
            - **Browser:** Chromium
            - **Headless Mode:** ${{ inputs.headless }}
            
            ### Artifacts
            - **Report:** Download "playwright-report" artifact
            - **Videos:** Download "playwright-videos" artifact (if tests failed)
            
            [View Full Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;
            
            console.log(comment);

